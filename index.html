<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" /> 
    <link rel="icon" href="img/hello.png" />
  </head>
  <body>
    <div class="calculator">
      <label><input type="text" id="calinput" /></label>
      <div class="buttons">
        <button id="btnclear">C</button>
        <button id="btnpi">&pi;</button>
        <button id="btnback">&#9003;</button><br />
        <button id="btn1">1</button>
        <button id="btn2">2</button>
        <button id="btn3">3</button>
        <button id="btnplus">+</button><br />
        <button id="btn4">4</button>
        <button id="btn5">5</button>
        <button id="btn6">6</button>
        <button id="btnminus">-</button><br />
        <button id="btn7">7</button>
        <button id="btn8">8</button>
        <button id="btn9">9</button>
        <button id="btnmultiply">*</button><br />
        <button id="btndivide">/</button>
        <button id="btn0">0</button>
        <button id="btndot">.</button>
        <button id="btnequals">=</button><br /><br />
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
